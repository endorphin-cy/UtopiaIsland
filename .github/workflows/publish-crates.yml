name: Publish to crates.io

on:
  push:
    tags:
      - 'winisland-plugin-api-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Parse crate name and version from tag
        id: parse
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # e.g. winisland-plugin-api-v0.2.0 → package=winisland-plugin-api, version=0.2.0
          PACKAGE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches Cargo.toml
        shell: bash
        run: |
          PKG="${{ steps.parse.outputs.package }}"
          EXPECTED="${{ steps.parse.outputs.version }}"
          FOUND=$(cargo metadata --format-version 1 --no-deps | \
            python3 -c "import sys,json; data=json.load(sys.stdin); \
            pkg=[p for p in data['packages'] if p['name']=='$PKG'][0]; print(pkg['version'])")
          if [ "$FOUND" != "$EXPECTED" ]; then
            echo "Version mismatch: tag says $EXPECTED, Cargo.toml says $FOUND"
            exit 1
          fi
          echo "Version $FOUND verified"

      - name: Publish
        run: cargo publish -p ${{ steps.parse.outputs.package }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
